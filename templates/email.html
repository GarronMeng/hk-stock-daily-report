<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:Arial,sans-serif;max-width:700px;margin:0 auto;padding:20px;background:#f5f5f5">
<div style="background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
<h1 style="color:#c0392b;text-align:center;border-bottom:2px solid #c0392b;padding-bottom:12px">HK Stock Daily Report - {{DATE}}</h1>

<h2 style="color:#2c3e50">Market Indices</h2>
<table style="width:100%;border-collapse:collapse">
<tr style="background:#34495e;color:#fff"><th style="padding:8px;text-align:left">Index</th><th style="padding:8px">Close</th><th style="padding:8px">Change</th><th style="padding:8px">Change %</th></tr>
{{INDEX_ROWS}}
</table>

<h2 style="color:#2c3e50;margin-top:24px">Stock Watchlist</h2>
<table style="width:100%;border-collapse:collapse">
<tr style="background:#34495e;color:#fff"><th style="padding:8px;text-align:left">Name</th><th style="padding:8px">Ticker</th><th style="padding:8px">Close</th><th style="padding:8px">Change</th><th style="padding:8px">Change %</th><th style="padding:8px">Volume</th></tr>
{{STOCK_ROWS}}
</table>

<h2 style="color:#2c3e50;margin-top:24px">Market News</h2>
<ul style="line-height:1.8">{{NEWS_ITEMS}}</ul>

<h2 style="color:#2c3e50;margin-top:24px">AI Summary</h2>
<div style="background:#f8f9fa;border-left:4px solid #c0392b;padding:16px;border-radius:4px;line-height:1.8">{{AI_SUMMARY}}</div>

<p style="text-align:center;color:#999;margin-top:24px;font-size:12px">Auto-generated by GitHub Actions | Data: Yahoo Finance & AkShare</p>
</div>
</body>
</html>
