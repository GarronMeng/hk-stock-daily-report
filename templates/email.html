<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family:Arial,sans-serif;max-width:700px;margin:0 auto;padding:20px;background:#f5f5f5">
<div style="background:#fff;border-radius:8px;padding:24px;box-shadow:0 2px 8px rgba(0,0,0,0.1)">
<h1 style="color:#c0392b;text-align:center;border-bottom:2px solid #c0392b;padding-bottom:12px">🇭🇰 港股日报 - {{DATE}}</h1>

<h2 style="color:#2c3e50">📊 大盘指数</h2>
<table style="width:100%;border-collapse:collapse">
<tr style="background:#34495e;color:#fff"><th style="padding:8px;text-align:left">指数</th><th style="padding:8px">收盘</th><th style="padding:8px">涨跌</th><th style="padding:8px">涨跌幅</th></tr>
{{INDEX_ROWS}}
</table>

<h2 style="color:#2c3e50;margin-top:24px">📈 个股追踪</h2>
<table style="width:100%;border-collapse:collapse">
<tr style="background:#34495e;color:#fff"><th style="padding:8px;text-align:left">名称</th><th style="padding:8px">代码</th><th style="padding:8px">收盘</th><th style="padding:8px">涨跌</th><th style="padding:8px">涨跌幅</th><th style="padding:8px">成交量</th></tr>
{{STOCK_ROWS}}
</table>

<h2 style="color:#2c3e50;margin-top:24px">📰 市场资讯</h2>
<ul style="line-height:1.8">{{NEWS_ITEMS}}</ul>

<h2 style="color:#2c3e50;margin-top:24px">🤖 AI 摘要</h2>
<div style="background:#f8f9fa;border-left:4px solid #c0392b;padding:16px;border-radius:4px;line-height:1.8">{{AI_SUMMARY}}</div>

<p style="text-align:center;color:#999;margin-top:24px;font-size:12px">自动生成 by GitHub Actions | 数据来源: Yahoo Finance & AkShare</p>
</div>
</body>
</html>
