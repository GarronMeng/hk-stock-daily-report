<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;background:#1a1a1a">
<div style="font-family:Consolas,'Courier New',monospace;max-width:720px;margin:0 auto;padding:20px;background:#1a1a1a;color:#d4d4d4;font-size:13px;line-height:1.6">

<div style="color:#e8a838;font-size:18px;font-weight:bold">✱ ✱ ✱ HK/CHINA MORNING BRIEF ✱ ✱ ✱</div>
<div style="color:#888;margin-bottom:16px">{{DATETIME}}</div>
<hr style="border:none;border-top:1px solid #444;margin:12px 0">

<!-- Market Snapshot -->
<div style="color:#e8a838;margin-bottom:4px">{{FUTURES_LINE}}</div>

<!-- Index Table -->
<div style="margin:12px 0">
<div style="color:#888;font-size:11px;margin-bottom:4px">MARKET INDICES</div>
<table style="border-collapse:collapse;font-size:12px">
{{INDEX_TABLE}}
</table>
</div>

<!-- ADR / Key Stocks Grid -->
<div style="margin:16px 0">
<div style="color:#888;font-size:11px;margin-bottom:4px">CORE WATCHLIST</div>
<table style="border-collapse:collapse;font-size:12px;width:100%">
{{STOCK_GRID}}
</table>
</div>

<!-- Southbound / Northbound -->
{{FLOW_SECTION}}

<!-- Corps -->
<div style="margin:16px 0">
<div style="color:#888;font-size:11px;margin-bottom:8px">CORPS</div>
{{CORPS_ITEMS}}
</div>

<!-- Spotlight -->
<div style="margin:16px 0">
<div style="color:#888;font-size:11px;margin-bottom:8px">TODAY'S SPOTLIGHT</div>
{{SPOTLIGHT_ITEMS}}
</div>

<!-- AI Brief -->
<div style="margin:16px 0">
<div style="color:#888;font-size:11px;margin-bottom:8px">MARKET BRIEF</div>
<div style="color:#d4d4d4">{{AI_BRIEF}}</div>
</div>

<hr style="border:none;border-top:1px solid #444;margin:16px 0">
<div style="color:#555;font-size:10px">Auto-generated | Data: Yahoo Finance, AkShare &amp; Claude AI</div>
</div>
</body>
</html>
